<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f538d"/>
      <stop offset="100%" style="stop-color:#6d3a9c"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M128 16 L220 54 L220 128 C220 178 180 218 128 240 C76 218 36 178 36 128 L36 54 Z"
        fill="url(#shieldGrad)" stroke="#85B7EB" stroke-width="3"/>
  <!-- Inner shield -->
  <path d="M128 36 L204 68 L204 128 C204 168 172 200 128 218 C84 200 52 168 52 128 L52 68 Z"
        fill="url(#innerGrad)"/>
  <!-- Circuit lines -->
  <line x1="88" y1="100" x2="168" y2="100" stroke="#2dc97e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="128" x2="168" y2="128" stroke="#2dc97e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="156" x2="168" y2="156" stroke="#2dc97e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="88"  cy="100" r="5" fill="#e74c3c"/>
  <circle cx="128" cy="100" r="5" fill="#2dc97e"/>
  <circle cx="168" cy="100" r="5" fill="#2dc97e"/>
  <circle cx="88"  cy="128" r="5" fill="#2dc97e"/>
  <circle cx="128" cy="128" r="7" fill="#f39c12"/>
  <circle cx="168" cy="128" r="5" fill="#2dc97e"/>
  <circle cx="88"  cy="156" r="5" fill="#2dc97e"/>
  <circle cx="128" cy="156" r="5" fill="#2dc97e"/>
  <circle cx="168" cy="156" r="5" fill="#e74c3c"/>
  <!-- Vertical connections -->
  <line x1="88"  y1="100" x2="88"  y2="156" stroke="#1f77b4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="128" y1="100" x2="128" y2="156" stroke="#1f77b4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="168" y1="100" x2="168" y2="156" stroke="#1f77b4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Center glow -->
  <circle cx="128" cy="128" r="10" fill="none" stroke="#f39c12" stroke-width="2" opacity="0.6"/>
  <circle cx="128" cy="128" r="16" fill="none" stroke="#f39c12" stroke-width="1" opacity="0.3"/>
</svg>
