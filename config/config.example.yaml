app:
  version: "2.1"
  window_size: "1200x750"
api:
  host: "0.0.0.0"
  port: 8000
  db_path: "data/rootkitguard.db"
models:
  rf_path: "models/rf_cicids.pkl"
  scaler_path: "models/scaler_cicids.pkl"
scan:
  threshold: 0.5
  default_rows: 10000
monitor:
  interval_sec: 5
  suspicious_ports: [4444, 1337, 31337]
notifications:
  enabled: true
  min_threat_lvl: "СРЕДНЯЯ"
logging:
  level: "INFO"
  file: "logs/rootkitguard.log"
  max_bytes: 10485760
  backup_count: 3
anthropic:
  api_key: ""
